<!DOCTYPE html>

<html lang  = "en", id = "apply_page">

    <head>

        <title>Apply Form Page</title>
        <meta charset = "UTF-8">
        <meta name = "description" content = "Apply form page for applied web project part 1">
        <meta name = "keywords" content = "&lt;form&gt;-related elements">
        <meta name = "author" content = "Joshua Boukouvalas (for this page)">
        <link href="styles/styles.css" rel="stylesheet">

    </head>

    <body>


        <header>
            <!-- Common navigation menu will go here when it is created -->
             <h1>Apply Page</h1>
        </header>

        <form method="post" action="https://mercury.swin.edu.au/it000000/formtest.php">
            
            <fieldset>
                <p><label for = reference_number>Job reference number: *</label>
                    <br>
                    <input type = "text" name = "reference_number" id = "reference_number" pattern = "^[A-Za-z0-9]*$" minlength="5" maxlength="5" required = "required">
                </p>
            </fieldset>

            <br>

            <fieldset>
                <legend>Personal information</legend>
                <br>
                <fieldset>
                    <legend>Name</legend>
                    <p><label for = "first_name">First name: *</label>
                        <br>
                        <input type = "text" name = "first_name" id = "first_name" pattern = "^[a-zA-Z][\sa-zA-Z]*$" maxlength = "20" required = "required">
                    </p>

                    <p><label for = "last_name">Last name: *</label>
                        <br>
                        <input type = "text" name = "last_name" id = "last_name" pattern = "^[a-zA-Z][\sa-zA-Z]*$" maxlength = "20" required = "required">
                    </p>
                </fieldset>

                <br>

                <fieldset>
                <p><label for = "date_of_birth">Date of birth: *</label>
                    <br>
                    <input type = "date" name = "date_of_birth" id = "date_of_birth" required = "required">
                </p>
                </fieldset>

                <br>

                <fieldset>
                    <legend>Gender</legend>
                    <p>
                        <input type = "radio" name = "gender" id = "male" value = "male" required = "required">           
                        <label for = "male">Male</label> 

                        <input type = "radio" name = "gender" id = "female" value = "female">
                        <label for = "female">Female</label>

                        <input type = "radio" name = "gender" id = "non_binary" value = "non_binary">
                        <label for = "non_binary">Non-binary</label>

                        <input type = "radio" name = "gender" id = "Prefer_not_to_say" value = "Prefer_not_to_say">
                        <label for = "Prefer_not_to_say">Prefer not to say</label>
                    </p>
                </fieldset>

                <br>

                <fieldset>
                    <legend>Address</legend>
                    <p><label for = "street_address">Street address: *</label>
                        <br>
                        <input type = "text" name = "street_address" id = "street_address" maxlength = "40" required = "required">
                    </p>
                    
                    <p><label for = "suburb">Suburb/town: *</label>
                        <br>
                        <input type = "text" name = "suburb" id = "suburb" maxlength = "40" required = "required">
                    </p>

                    <p><label for = "state">State: *</label>
                        <br>
                        <select name = "state" id = "state" required  = "required">
                            <option value = "">Please select</option>	
                            <option value = "vic">VIC</option>			
                            <option value = "nsw">NSW</option>
                            <option value = "qld">QLD</option>
                            <option value = "nt">NT</option>
                            <option value = "wa">WA</option>
                            <option value = "sa">SA</option>
                            <option value = "tas">TAS</option>
                            <option value = "act">ACT</option>
                        </select>
                    </p>

                    <p><label for = "postcode">Postcode: *</label>
                        <br>
                        <input type = "text" name = "postcode" id = "postcode" pattern = "^[0-9]*$" minlength="4" maxlength = "4" required = "required">
                    </p>
                </fieldset>

                <br>

                <fieldset>
                    <legend>Email and phone number</legend>
                    <p><label for = "email">Email address: *</label>
                        <br>
                        <input type = "email" name = "email" id = "email" required = "required">
                    </p>

                    <p><label for = "phone_number">Phone number: *</label>
                        <br>
                        <input type = "text" name = "phone_number" id = "phone_number" pattern = "^[0-9]*$" minlength="8" maxlength = "12" required = "required">
                    </p>

                </fieldset>

            </fieldset>

            <br>

            <fieldset>
                <legend>Job information</legend>
                <p>
                    <label>Skill list: *</label>
                    <br>
                    <input type = "checkbox" name = "skill" id = "skill1" value = "skill1" checked = "checked">
                    <label for = "skill1">Skill 1</label>
                    <br>

                    <input type = "checkbox" name = "skill" id = "skill2" value = "skill2">
                    <label for = "skill2">Skill 2</label>
                    <Br>

                    <input type = "checkbox" name = "skill" id = "skill3" value = "skill3">
                    <label for = "skill3">Skill 3</label>
                    <br>

                    <input type = "checkbox" name = "skill" id = "skill4" value = "skill4">
                    <label for = "skill4">Skill 4</label>
                    <br>

                    <input type = "checkbox" name = "skill" id = "skill5" value = "skill5">
                    <label for = "skill5">Skill 5</label>
                </p>

                <br>
                
                <p><label>Other skills:</label></p>
                <p><textarea id="other_skills" name="other_skills" rows="6" cols="30" placeholder="Write other skills here..."></textarea>
                </p>
            </fieldset>

            <input type= "submit" value="submit">
            <input type= "reset" value="Reset form">

        </form>







    </body>



</html>
